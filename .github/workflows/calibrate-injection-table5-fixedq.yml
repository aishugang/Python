name: Calibrate injection-seismicity Table 5 at fixed published Q

on:
  pull_request:
    paths:
      - 'table5-fixedq/**'
      - '.github/workflows/calibrate-injection-table5-fixedq.yml'
  workflow_dispatch:

jobs:
  calibrate-fixedq:
    name: ${{ matrix.variant }}
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        variant:
          - paper_boundary_baseline
          - paper_boundary_ss10
          - paper_boundary_ss10_ds05
          - paper_insitu_ss10
          - paper_insitu_ss10_ds05
          - source_aperture_insitu_ss10_ds05
          - paper_insitu_ss8_ds04
          - paper_insitu_ss12_ds06

    steps:
      - name: Checkout reproduction harness
        uses: actions/checkout@v4

      - name: Checkout author's first public MATLAB archive
        uses: actions/checkout@v4
        with:
          repository: MohammadSabah93/XFEM-Injection-Induced-Seismicity
          ref: 8f7b13737863100031ccd8f26e18ce92538d11a0
          path: author

      - name: Set up MATLAB R2022b
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2022b
          cache: true

      - name: Prepare fixed-Q variant
        run: |
          python table5-reproduction/prepare_case.py --author-dir author --output-dir "work/${{ matrix.variant }}"
          python table5-fixedq/apply_fixedq_variant.py --case-dir "work/${{ matrix.variant }}" --variant "${{ matrix.variant }}"

      - name: Run author model in licensed MATLAB
        uses: matlab-actions/run-command@v3
        with:
          command: workspace=getenv('GITHUB_WORKSPACE'); cd(fullfile(workspace,'work','${{ matrix.variant }}')); run_table5_ci

      - name: Score event structure
        if: always()
        run: python table5-fixedq/score_fixedq.py --case-dir "work/${{ matrix.variant }}"

      - name: Upload fixed-Q evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: table5-fixedq-${{ matrix.variant }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            work/${{ matrix.variant }}/FIXEDQ_VARIANT.json
            work/${{ matrix.variant }}/FIXEDQ_SCORE.json
            work/${{ matrix.variant }}/Table5_reproduced.csv
            work/${{ matrix.variant }}/Table5_results.mat
            work/${{ matrix.variant }}/Table5_state_compact.mat
            work/${{ matrix.variant }}/Table5_checkpoint.mat
            work/${{ matrix.variant }}/REPRODUCTION_PATCH.txt
            work/${{ matrix.variant }}/run.log
            work/${{ matrix.variant }}/run_error.txt
